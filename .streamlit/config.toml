[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#0f62fe"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f7f8fa"
textColor = "#1f2328"
font = "sans serif"

[runner]
fastReruns = true

[client]
toolbarMode = "minimal"
showErrorDetails = true

[logger]
level = "info"
